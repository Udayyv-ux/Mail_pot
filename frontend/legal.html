<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legal & Policies - Sheetx.io</title>
    <!-- Tailwind CSS (via CDN for simplicity, replace with build process for prod) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.7.2/dist/full.min.css" rel="stylesheet" type="text/css" />
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        dark: '#0f172a',
                        primary: '#3b82f6',
                        secondary: '#8b5cf6',
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; overflow-x: hidden; }
        .prose h1, .prose h2, .prose h3, .prose h4 { color: #f8fafc; font-weight: 700; margin-top: 2rem; margin-bottom: 1rem; }
        .prose p { color: #94a3b8; line-height: 1.7; margin-bottom: 1.25rem; }
        .prose ul { list-style-type: disc; padding-left: 1.5rem; color: #94a3b8; margin-bottom: 1.25rem; }
        .prose a { color: #3b82f6; text-decoration: underline; }
        .policy-tab.active { background-color: rgba(59, 130, 246, 0.1); color: #3b82f6; border-left: 3px solid #3b82f6; font-weight: 600; }
        .policy-tab { border-left: 3px solid transparent; }
    </style>
</head>
<body class="min-h-screen flex flex-col bg-[#0f172a] text-slate-200">

    <!-- Header -->
    <header class="fixed w-full top-0 z-50 bg-[#0f172a]/80 backdrop-blur-md border-b border-white/5">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
            <a href="/" class="flex items-center gap-2">
                <div class="w-8 h-8 rounded bg-gradient-to-br from-primary to-secondary flex items-center justify-center font-bold text-white shadow-lg shadow-primary/20">S</div>
                <span class="text-xl font-bold tracking-tight">Sheetx<span class="text-primary">.io</span></span>
            </a>
            <nav class="hidden md:flex gap-8 text-sm font-medium">
                <a href="/#features" class="text-gray-300 hover:text-white transition-colors">Features</a>
                <a href="/#how-it-works" class="text-gray-300 hover:text-white transition-colors">How it works</a>
                <a href="/#pricing" class="text-gray-300 hover:text-white transition-colors">Pricing</a>
            </nav>
            <div class="flex items-center gap-4">
                <a href="/admin/" class="text-sm font-medium text-gray-300 hover:text-white transition-colors">Log in</a>
                <button class="btn btn-primary btn-sm rounded-full text-white px-6 hidden sm:flex shadow-lg shadow-primary/20" onclick="window.location.href='/admin/'">Get Started</button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow pt-32 pb-24 max-w-7xl mx-auto w-full px-6 relative z-10">
        
        <!-- Header Section -->
        <div class="text-center mb-16" id="legal-header">
            <h1 class="text-4xl md:text-5xl font-bold text-white mb-4">Documents & Policies</h1>
            <p class="text-xl text-gray-400 font-light max-w-2xl mx-auto">Transparency, compliance, and trust are central to how Sheetx.io operates.</p>
        </div>

        <!-- Grid View (Default) -->
        <div id="policy-grid-view">
            <div id="policy-grid-loader" class="flex justify-center items-center h-64">
                <span class="loading loading-spinner text-primary loading-lg"></span>
            </div>
            <!-- Grid container injected by JS -->
            <div id="policy-grid-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 hidden">
                <!-- Cards go here -->
            </div>
        </div>

        <!-- Reader View (When ?policy=slug) -->
        <div id="policy-reader-view" class="hidden">
            <div class="mb-8">
                <a href="/regulations" class="inline-flex items-center gap-2 text-primary hover:text-white transition-colors font-medium">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                    Back to all policies
                </a>
            </div>
            <div class="bg-base-200 border border-white/5 p-8 md:p-16 rounded-3xl shadow-xl max-w-4xl mx-auto">
                <div id="policy-reader-loader" class="flex justify-center items-center h-64">
                    <span class="loading loading-spinner text-primary loading-lg"></span>
                </div>
                <div id="policy-body" class="hidden">
                    <h1 id="policy-title" class="text-4xl md:text-6xl font-bold text-white mb-8"></h1>
                    <div id="policy-text" class="prose prose-invert max-w-none text-gray-300 prose-lg">
                        <!-- Content injected here -->
                    </div>
                </div>
            </div>
        </div>
        
    </main>

    <!-- Footer -->
    <footer class="bg-base-300/50 border-t border-white/5 pt-12 pb-8">
        <div class="max-w-7xl mx-auto px-6 text-center text-sm text-gray-500">
            <p>© 2026 Sheetx.io. All rights reserved.</p>
        </div>
    </footer>

    <!-- Include API Utility -->
    <script src="/js/api.js"></script>
    <!-- Include Legal Page Logic -->
    <script src="/js/legal.js"></script>
</body>
</html>
